version: '3.9'

# Athena - Strategic Knowledge Copilot - Docker Compose Configuration
# Consolidated architecture: 3 application services + infrastructure

services:
  # =============================================================================
  # Data Infrastructure
  # =============================================================================

  postgres:
    image: postgres:16
    container_name: athena-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-athena_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-athena_password}
      POSTGRES_DB: ${POSTGRES_DB:-athena_knowledge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athena_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athena-network

  redis:
    image: redis:7-alpine
    container_name: athena-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - athena-network

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: athena-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athena-network

  # =============================================================================
  # ML/Inference Services
  # =============================================================================

  vllm:
    image: vllm/vllm-openai:v0.6.6
    container_name: athena-vllm
    ports:
      - "${VLLM_PORT:-8080}:8000"
    environment:
      - MODEL=${VLLM_MODEL:-abi-commits/qwen-query-optimizer}
      - GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      - MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-2048}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    volumes:
      - vllm_cache:/root/.cache/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - athena-network
    depends_on:
      - redis

  # =============================================================================
  # Application Services (Consolidated: 3 services)
  # =============================================================================

  api-service:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: athena-api-service
    ports:
      - "${API_SERVICE_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-athena_user}:${POSTGRES_PASSWORD:-athena_password}@postgres:5432/${POSTGRES_DB:-athena_knowledge}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CONTEXT_ENGINE_SERVICE_URL=http://context-engine-service:8000
      - INFERENCE_SERVICE_URL=http://inference-service:8000
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.6}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS:-[]}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      context-engine-service:
        condition: service_healthy
      inference-service:
        condition: service_healthy
    networks:
      - athena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  context-engine-service:
    build:
      context: .
      dockerfile: services/context_engine/Dockerfile
    container_name: athena-context-engine-service
    ports:
      - "${KNOWLEDGE_SERVICE_PORT:-8001}:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-documents}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - RERANKER_MODEL=${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-athena_user}:${POSTGRES_PASSWORD:-athena_password}@postgres:5432/${POSTGRES_DB:-athena_knowledge}
      - REDIS_URL=redis://redis:6379/1
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS:-4096}
    volumes:
      - model_cache:/root/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - athena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  inference-service:
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    container_name: athena-inference-service
    ports:
      - "${INFERENCE_SERVICE_PORT:-8002}:8000"
    environment:
      - VLLM_URL=http://vllm:8000
      - LLM_MODEL=${LLM_MODEL:-abi-commits/qwen-query-optimizer}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - model_cache:/root/.cache
    depends_on:
      - vllm
    networks:
      - athena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# =============================================================================
# Volumes
# =============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  vllm_cache:
    driver: local
  model_cache:
    driver: local

# =============================================================================
# Networks
# =============================================================================

networks:
  athena-network:
    driver: bridge
