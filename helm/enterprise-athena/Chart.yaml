apiVersion: v2
name: athena
description: >-
  Athena - Strategic Knowledge Copilot -- 3-service AKS deployment
  (API + Knowledge + Inference) with Qdrant vector store,
  Azure Key Vault CSI secrets, Workload Identity, and GPU support.
type: application
version: 1.3.0
appVersion: "1.0.0"

# Require Kubernetes >= 1.29 (AKS default as of early 2025).
# RuntimeClass scheduling field requires >= 1.20; HPA v2 requires >= 1.23;
# PodDisruptionBudget policy/v1 requires >= 1.21.
kubeVersion: ">=1.29.0-0"

keywords:
  - knowledge-copilot
  - ai
  - rag
  - fastapi
  - qdrant
  - vllm
  - athena
maintainers:
  - name: abi-commits
    url: https://github.com/abi-commits/athena-ai
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - 1.0.0: Initial Helm chart for production AKS deployment
    - 1.1.0: Phase 3 -- PSS restricted templates, Qdrant StatefulSet, vLLM GPU deployment
    - 1.2.0: Phase 4 -- OTEL env wired to Tempo for all services
    - 1.3.0: Phase 5/6 -- Qdrant backup CronJob, vLLM Service/HPA/PDB, NVIDIA RuntimeClass
