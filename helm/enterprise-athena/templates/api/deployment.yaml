{{- if .Values.api.enabled }}
##########################################################################
# API Service — Deployment
# Runs the consolidated Gateway + Auth + Metrics service.
# Secrets injected from Key Vault via CSI SecretProviderClass.
##########################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0     # zero-downtime during updates
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "athena.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
        # Workload Identity webhook injects AZURE_CLIENT_ID etc.
        azure.workload.identity/use: "true"
      annotations:
        # Roll pods on ConfigMap/Secret changes
        checksum/values: {{ .Values | toJson | sha256sum }}
    spec:
      serviceAccountName: sa-api-service
      automountServiceAccountToken: true   # required for Workload Identity token projection
      securityContext:
        {{- include "athena.podSecurityContext" . | nindent 8 }}
      # Target app node pool only
      nodeSelector:
        agentpool: apppool
      # Spread pods across availability zones and nodes for HA
      topologySpreadConstraints:
        {{- include "athena.topologySpread" (dict "component" "api") | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: api-service
          image: {{ include "athena.image" (dict "acr" .Values.global.acr "repo" .Values.api.image.repository "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "athena.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Non-secret environment variables
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            {{- range $key, $value := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Secrets from Key Vault (via K8s Secret synced by CSI driver)
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: athena-api-runtime-secrets
                  key: JWT_SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: athena-api-runtime-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: athena-api-runtime-secrets
                  key: REDIS_URL
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: athena-api-runtime-secrets
                  key: ALERT_WEBHOOK_URL
                  optional: true
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            # CSI volume must be mounted to trigger K8s Secret sync
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            # Writable /tmp required for readOnlyRootFilesystem=true
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- include "athena.secretsVolume" (dict "secretProviderClass" "athena-api-kv-secrets") | nindent 8 }}
        {{- include "athena.tmpVolume" . | nindent 8 }}
{{- end }}
