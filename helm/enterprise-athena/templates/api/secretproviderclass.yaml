{{- if .Values.api.enabled }}
##########################################################################
# API Service — SecretProviderClass (Azure Key Vault CSI Driver)
#
# This class:
#   1. Pulls secrets from Azure Key Vault using the api-service Managed Identity
#   2. Creates a Kubernetes Secret (athena-api-runtime-secrets) that the pod
#      references via env.valueFrom.secretKeyRef
#
# The CSI volume MUST be mounted by at least one pod for the K8s Secret to sync.
##########################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: athena-api-kv-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  provider: azure
  # secretObjects → creates/updates a native K8s Secret on every sync
  secretObjects:
    - secretName: athena-api-runtime-secrets
      type: Opaque
      data:
        - objectName: jwt-secret-key
          key: JWT_SECRET_KEY
        - objectName: postgres-connection-string
          key: DATABASE_URL
        - objectName: redis-connection-string
          key: REDIS_URL
        - objectName: alert-webhook-url
          key: ALERT_WEBHOOK_URL
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.api.managedIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.keyVault.name | quote }}
    tenantId: {{ .Values.global.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: jwt-secret-key
          objectType: secret
        - |
          objectName: postgres-connection-string
          objectType: secret
        - |
          objectName: redis-connection-string
          objectType: secret
        - |
          objectName: alert-webhook-url
          objectType: secret
{{- end }}
