{{- if .Values.alembic.enabled }}
##########################################################################
# Alembic Migration — Helm pre-upgrade/pre-install Hook Job
#
# Runs `alembic upgrade head` before any application pods are rolled.
# Guarantees schema is always ahead of running code.
#
# Hook lifecycle:
#   helm.sh/hook: pre-install,pre-upgrade
#     → runs before new pods are created
#   helm.sh/hook-weight: "-10"
#     → runs before other hooks (lower weight = earlier)
#   helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
#     → deletes the previous Job before each run, and cleans up on success
#     → failed jobs are preserved for debugging
#
# PSS restricted: runs as UID 1000, readOnlyRootFilesystem, drop ALL caps.
##########################################################################
apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate-{{ .Release.Revision }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: alembic
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": {{ .Values.alembic.hookDeletePolicy | quote }}
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300    # fail hard after 5 minutes
  ttlSecondsAfterFinished: 600  # auto-clean failed jobs after 10 minutes
  template:
    metadata:
      labels:
        {{- include "athena.labels" . | nindent 8 }}
        app.kubernetes.io/component: alembic
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: sa-alembic-job
      automountServiceAccountToken: true
      securityContext:
        {{- include "athena.podSecurityContext" . | nindent 8 }}
      nodeSelector:
        agentpool: apppool
      containers:
        - name: alembic
          image: {{ include "athena.image" (dict "acr" .Values.global.acr "repo" .Values.alembic.image.repository "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "athena.containerSecurityContext" . | nindent 12 }}
          command:
            - alembic
            - upgrade
            - head
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: athena-alembic-runtime-secrets
                  key: DATABASE_URL
            # Alembic uses the sync URL (asyncpg → psycopg2 suffix stripped)
            # The settings.get_sync_database_url() method handles this.
          resources:
            {{- toYaml .Values.alembic.resources | nindent 12 }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- include "athena.secretsVolume" (dict "secretProviderClass" "athena-alembic-kv-secrets") | nindent 8 }}
        {{- include "athena.tmpVolume" . | nindent 8 }}
{{- end }}
