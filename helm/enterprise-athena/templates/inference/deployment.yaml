{{- if .Values.inference.enabled }}
##########################################################################
# Inference Service — Deployment
# Lightweight FastAPI proxy that calls vLLM for generation and provides
# fallback template-based answers when vLLM is unavailable.
##########################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
spec:
  replicas: {{ .Values.inference.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: inference
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "athena.labels" . | nindent 8 }}
        app.kubernetes.io/component: inference
        azure.workload.identity/use: "true"
      annotations:
        checksum/values: {{ .Values | toJson | sha256sum }}
    spec:
      serviceAccountName: sa-inference-service
      automountServiceAccountToken: true
      securityContext:
        {{- include "athena.podSecurityContext" . | nindent 8 }}
      nodeSelector:
        agentpool: apppool
      topologySpreadConstraints:
        {{- include "athena.topologySpread" (dict "component" "inference") | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: inference-service
          image: {{ include "athena.image" (dict "acr" .Values.global.acr "repo" .Values.inference.image.repository "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "athena.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            {{- range $key, $value := .Values.inference.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: HUGGINGFACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: athena-inference-runtime-secrets
                  key: HUGGINGFACE_HUB_TOKEN
                  optional: true
          livenessProbe:
            {{- toYaml .Values.inference.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.inference.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.inference.resources | nindent 12 }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- include "athena.secretsVolume" (dict "secretProviderClass" "athena-inference-kv-secrets") | nindent 8 }}
        {{- include "athena.tmpVolume" . | nindent 8 }}
{{- end }}
