{{- if and .Values.networkPolicies.enabled .Values.api.enabled }}
##########################################################################
# NetworkPolicy — API Service
#
# Ingress:
#   - Port 8000 from NGINX ingress controller (namespace: ingress-nginx)
#   - Port 9090 (metrics) from monitoring namespace (Prometheus)
#
# Egress:
#   - Port 80 to knowledge-service (in-cluster)
#   - Port 80 to inference-service (in-cluster)
#   - Port 6379/6380 to Redis private endpoint (Azure Cache for Redis, TLS)
##########################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-service-netpol
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from NGINX ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP

  egress:
    # → knowledge-service (internal)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: knowledge
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 8000
          protocol: TCP
    # → inference-service (internal)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: inference
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 8000
          protocol: TCP
    # → Redis private endpoint (TLS port 6380)
    - ports:
        - port: 6380
          protocol: TCP
{{- end }}
