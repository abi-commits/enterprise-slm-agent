{{- if and .Values.networkPolicies.enabled .Values.context-engine.enabled }}
##########################################################################
# NetworkPolicy — Knowledge Service
#
# Ingress:
#   - Port 8000 from api-service (in-cluster)
#   - Port 9090 (metrics) from monitoring namespace
#
# Egress:
#   - Port 6333/6334 to qdrant (in-cluster)
#   - Port 6380 to Redis private endpoint (TLS)
#   - Port 5432 to PostgreSQL private endpoint
##########################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: context-engine-service-netpol
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: context-engine
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: context-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow from api-service
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 8000
          protocol: TCP
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
          protocol: TCP

  egress:
    # → Qdrant REST
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: qdrant
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 6333
          protocol: TCP
        - port: 6334
          protocol: TCP
    # → Redis private endpoint (TLS)
    - ports:
        - port: 6380
          protocol: TCP
    # → PostgreSQL private endpoint
    - ports:
        - port: 5432
          protocol: TCP
{{- end }}
