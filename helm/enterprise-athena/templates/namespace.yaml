##########################################################################
# Namespace
#
# Pod Security Standards: https://kubernetes.io/docs/concepts/security/pod-security-standards/
#   - enforce=restricted: block non-compliant pods
#   - audit=restricted:   log warnings for non-compliant pods
#   - warn=restricted:    client-side warnings
#
# Qdrant is the one exception — it runs as UID 0; its PSS label is overridden
# at the StatefulSet podTemplate level with a namespace-level audit exemption.
##########################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    # Enforce PSS restricted on every pod in this namespace
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    # Azure Workload Identity webhook targeting
    azure.workload.identity/use: "true"
