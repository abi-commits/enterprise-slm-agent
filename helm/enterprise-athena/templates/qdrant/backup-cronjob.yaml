{{- if and .Values.qdrant.enabled .Values.qdrant.backup.enabled }}
##########################################################################
# Qdrant Backup — CronJob
#
# Schedule: {{ .Values.qdrant.backup.schedule }} (UTC)
# Retention: {{ .Values.qdrant.backup.retentionDays }} days
#
# Authentication to Azure Blob Storage:
#   Uses Azure Workload Identity (OIDC).  The ServiceAccount
#   '{{ .Values.qdrant.backup.serviceAccountName }}' must be annotated with
#   azure.workload.identity/client-id pointing to a managed identity that
#   holds 'Storage Blob Data Contributor' on the target storage account.
#
# The 'azure-workload-identity' mutating webhook injects the OIDC token
# automatically — no explicit az login required.
##########################################################################
apiVersion: batch/v1
kind: CronJob
metadata:
  name: qdrant-backup
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant-backup
  annotations:
    description: "Daily Qdrant vector snapshot to Azure Blob Storage"
spec:
  schedule: {{ .Values.qdrant.backup.schedule | quote }}
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid          # never run overlapping backups
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600      # skip if cluster was down at scheduled time
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600    # hard timeout: 1 hour
      ttlSecondsAfterFinished: 86400 # clean up completed job after 24h
      template:
        metadata:
          labels:
            {{- include "athena.labels" . | nindent 12 }}
            app.kubernetes.io/component: qdrant-backup
            # Required label for Workload Identity webhook
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: {{ .Values.qdrant.backup.serviceAccountName }}
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: "{{ .Values.qdrant.backup.image.repository }}:{{ .Values.qdrant.backup.image.tag }}"
              imagePullPolicy: {{ .Values.qdrant.backup.image.pullPolicy }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/bash
                - /scripts/backup.sh
              env:
                - name: QDRANT_URL
                  value: "http://qdrant.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.qdrant.service.restPort }}"
                - name: COLLECTION
                  value: {{ .Values.qdrant.backup.collection | quote }}
                - name: STORAGE_ACCOUNT
                  value: {{ .Values.qdrant.backup.storageAccountName | quote }}
                - name: CONTAINER
                  value: {{ .Values.qdrant.backup.containerName | quote }}
                - name: RETENTION_DAYS
                  value: {{ .Values.qdrant.backup.retentionDays | quote }}
                # Workload identity token path — auto-injected by webhook
                - name: AZURE_FEDERATED_TOKEN_FILE
                  value: /var/run/secrets/azure/tokens/azure-identity-token
              resources:
                {{- toYaml .Values.qdrant.backup.resources | nindent 16 }}
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backup-script
              configMap:
                name: qdrant-backup-script
                defaultMode: 0550
            - name: tmp
              emptyDir:
                sizeLimit: 10Gi    # temp space for in-progress snapshot stream
{{- end }}
