{{- if .Values.limitRange.enabled }}
##########################################################################
# LimitRange — per-container defaults and ceiling
# Ensures every container has sane resource requests even if omitted.
##########################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "athena.fullname" . }}-limits
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: {{ .Values.limitRange.defaultRequest.cpu | quote }}
        memory: {{ .Values.limitRange.defaultRequest.memory | quote }}
      default:
        cpu: {{ .Values.limitRange.default.cpu | quote }}
        memory: {{ .Values.limitRange.default.memory | quote }}
      max:
        cpu: {{ .Values.limitRange.max.cpu | quote }}
        memory: {{ .Values.limitRange.max.memory | quote }}
    - type: PersistentVolumeClaim
      max:
        storage: "200Gi"
{{- end }}
