{{- if .Values.context-engine.enabled }}
##########################################################################
# Knowledge Service — SecretProviderClass
# Pulls DATABASE_URL and REDIS_URL from Azure Key Vault.
##########################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: athena-context-engine-kv-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: context-engine
spec:
  provider: azure
  secretObjects:
    - secretName: athena-context-engine-runtime-secrets
      type: Opaque
      data:
        - objectName: postgres-connection-string
          key: DATABASE_URL
        - objectName: redis-connection-string
          key: REDIS_URL
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.context-engine.managedIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.keyVault.name | quote }}
    tenantId: {{ .Values.global.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: postgres-connection-string
          objectType: secret
        - |
          objectName: redis-connection-string
          objectType: secret
{{- end }}
