{{- if .Values.context-engine.enabled }}
##########################################################################
# Context Engine Service — Deployment
# Runs Search + Ingestion with shared embedding model instance.
# Memory request is higher than API because BGE + cross-encoder load into RAM.
##########################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-engine-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: context-engine
spec:
  replicas: {{ .Values.context-engine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: context-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "athena.labels" . | nindent 8 }}
        app.kubernetes.io/component: context-engine
        azure.workload.identity/use: "true"
      annotations:
        checksum/values: {{ .Values | toJson | sha256sum }}
    spec:
      serviceAccountName: sa-context-engine-service
      automountServiceAccountToken: true
      securityContext:
        {{- include "athena.podSecurityContext" . | nindent 8 }}
      nodeSelector:
        agentpool: apppool
      topologySpreadConstraints:
        {{- include "athena.topologySpread" (dict "component" "context-engine") | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: context-engine-service
          image: {{ include "athena.image" (dict "acr" .Values.global.acr "repo" .Values.context-engine.image.repository "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "athena.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            {{- range $key, $value := .Values.context-engine.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Secrets from Key Vault
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: athena-context-engine-runtime-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: athena-context-engine-runtime-secrets
                  key: REDIS_URL
            # Override REDIS_URL to use DB index 1 for context-engine service
            # (api-service uses DB index 0)
            # Note: set REDIS_URL to the full DSN with /1 suffix in terraform.tfvars
            - name: HF_HOME
              value: /model-cache/huggingface
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /model-cache/sentence-transformers
          livenessProbe:
            {{- toYaml .Values.context-engine.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.context-engine.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.context-engine.resources | nindent 12 }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.context-engine.modelCache.enabled }}
            - name: model-cache
              mountPath: /model-cache
            {{- end }}
      volumes:
        {{- include "athena.secretsVolume" (dict "secretProviderClass" "athena-context-engine-kv-secrets") | nindent 8 }}
        {{- include "athena.tmpVolume" . | nindent 8 }}
        {{- if .Values.context-engine.modelCache.enabled }}
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.context-engine.modelCache.sizeLimit }}
        {{- end }}
{{- end }}
