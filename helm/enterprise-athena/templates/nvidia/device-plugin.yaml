{{- if .Values.nvidia.devicePlugin.enabled }}
##########################################################################
# NVIDIA GPU Device Plugin — DaemonSet
#
# Runs on every node that carries the `agentpool=gpupool` label.
# Advertises nvidia.com/gpu resources to the scheduler so pods can
# request GPU via `resources.limits["nvidia.com/gpu"]: 1`.
#
# Namespace: nvidia-device-plugin (PSS privileged — required for device access)
#
# Reference: https://github.com/NVIDIA/k8s-device-plugin
##########################################################################
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "athena.labels" . | nindent 8 }}
        app.kubernetes.io/component: nvidia-device-plugin
    spec:
      # Run only on GPU nodes
      nodeSelector:
        agentpool: gpupool
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin
          image: "{{ .Values.nvidia.devicePlugin.image.repository }}:{{ .Values.nvidia.devicePlugin.image.tag }}"
          imagePullPolicy: {{ .Values.nvidia.devicePlugin.image.pullPolicy }}
          # Device plugin requires privileged access to enumerate GPU hardware
          securityContext:
            privileged: true
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
{{- end }}
