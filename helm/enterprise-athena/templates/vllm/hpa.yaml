{{- if .Values.vllm.enabled }}
##########################################################################
# vLLM — HorizontalPodAutoscaler
#
# GPU-aware scaling strategy:
#   - min replicas = 1  (always one warm model server)
#   - max replicas must not exceed the number of GPU nodes in gpupool
#     (1 pod per GPU — the Deployment uses Recreate to avoid contention)
#   - CPU scaling is a proxy for request queueing; adjust target to match
#     the expected idle CPU when vLLM is processing (typically 10–30%)
#
# For custom throughput-based scaling, consider KEDA with a Prometheus
# trigger on 'vllm:avg_generation_throughput_toks_per_s'.
##########################################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm
  minReplicas: 1
  maxReplicas: 2    # set to GPU node count; each pod consumes 1 × nvidia.com/gpu
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # vLLM is CPU-bound during tokenisation/detokenisation;
          # 60% CPU → add a second replica when the GPU pool supports it
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min to avoid model reload churn
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
{{- end }}
