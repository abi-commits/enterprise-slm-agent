##########################################################################
# values-production.yaml — Production overrides for enterprise-slm chart
#
# How to populate this file:
#   1. Run `terraform -chdir=infra/terraform/environments/production output`
#   2. Fill in the placeholder values below with the real terraform outputs
#   3. Commit this file (it contains no secrets, only references)
#
# Deploy command:
#   helm upgrade --install slm-prod ./helm/enterprise-slm \
#     -f helm/enterprise-slm/values-production.yaml \
#     --namespace slm-prod \
#     --create-namespace \
#     --wait \
#     --timeout 10m
##########################################################################

# ---------------------------------------------------------------------------
# Global — fill from terraform outputs
# ---------------------------------------------------------------------------
global:
  # terraform output acr_login_server
  acr: "acrslmprod.azurecr.io"    # REPLACE with real value

  # Image tag — set by CI/CD to git short SHA (e.g. "a1b2c3d")
  imageTag: "latest"              # REPLACE with ${GIT_SHA} in CI

  imagePullPolicy: IfNotPresent
  environment: "production"

  keyVault:
    # terraform output key_vault_name
    name: "kv-slm-prod"           # REPLACE with real value
    # az account show --query tenantId -o tsv
    tenantId: ""                  # REPLACE with Azure tenant ID

  namespace: "slm-prod"

# ---------------------------------------------------------------------------
# API Service
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2

  # terraform output managed_identity_client_ids | jq -r '."api-service"'
  managedIdentity:
    clientId: ""                  # REPLACE with real value

  hpa:
    minReplicas: 2
    maxReplicas: 8                # higher ceiling for production traffic

  env:
    KNOWLEDGE_SERVICE_URL: "http://knowledge-service.slm-prod.svc.cluster.local"
    INFERENCE_SERVICE_URL: "http://inference-service.slm-prod.svc.cluster.local"
    JWT_ALGORITHM: "HS256"
    ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    REFRESH_TOKEN_EXPIRE_DAYS: "7"
    RATE_LIMIT_REQUESTS: "200"
    RATE_LIMIT_WINDOW: "60"
    CONFIDENCE_THRESHOLD: "0.6"
    LOG_LEVEL: "INFO"
    UVICORN_WORKERS: "4"
    # CORS — set to your frontend domain(s):
    CORS_ORIGINS: '["https://your-app.example.com"]'

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Knowledge Service
# ---------------------------------------------------------------------------
knowledge:
  enabled: true
  replicaCount: 2

  # terraform output managed_identity_client_ids | jq -r '."knowledge-service"'
  managedIdentity:
    clientId: ""                  # REPLACE

  hpa:
    minReplicas: 2
    maxReplicas: 4

  env:
    QDRANT_URL: "http://qdrant.slm-prod.svc.cluster.local:6333"
    QDRANT_COLLECTION: "documents"
    EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
    RERANKER_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    CHUNK_SIZE: "512"
    CHUNK_OVERLAP: "50"
    LOG_LEVEL: "INFO"
    UVICORN_WORKERS: "2"

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  modelCache:
    enabled: true
    sizeLimit: "5Gi"

# ---------------------------------------------------------------------------
# Inference Service
# ---------------------------------------------------------------------------
inference:
  enabled: true
  replicaCount: 2

  # terraform output managed_identity_client_ids | jq -r '."inference-service"'
  managedIdentity:
    clientId: ""                  # REPLACE

  env:
    VLLM_URL: "http://vllm.slm-prod.svc.cluster.local:8000"
    LLM_MODEL: "abi-commits/qwen-query-optimizer"
    USE_VLLM: "true"
    LOG_LEVEL: "INFO"
    UVICORN_WORKERS: "2"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

# ---------------------------------------------------------------------------
# Alembic Migration Job
# ---------------------------------------------------------------------------
alembic:
  enabled: true

  # terraform output managed_identity_client_ids | jq -r '."alembic-job"'
  managedIdentity:
    clientId: ""                  # REPLACE

  hookDeletePolicy: "before-hook-creation,hook-succeeded"

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ---------------------------------------------------------------------------
# Qdrant
# ---------------------------------------------------------------------------
qdrant:
  enabled: true
  replicaCount: 1   # promote to 3 when enabling distributed mode

  persistence:
    storageClassName: "managed-premium"
    size: "50Gi"

  pdb:
    minAvailable: 1

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  backup:
    enabled: true
    schedule: "0 2 * * *"
    retentionDays: 7
    storageAccountName: "slmprodbackupsa"   # must match Terraform azurerm_storage_account name
    containerName: "qdrant-snapshots"
    collection: "documents"
    serviceAccountName: "sa-qdrant-backup"
    managedIdentityClientId: ""  # terraform output -json managed_identity_client_ids | jq -r '["qdrant-backup"]'
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"

# ---------------------------------------------------------------------------
# vLLM GPU Inference
# Enable this section once GPU node pool is provisioned and NVIDIA
# device plugin reports nvidia.com/gpu resources on gpupool nodes.
# ---------------------------------------------------------------------------
vllm:
  # Change to true after: terraform apply (GPU pool) + NVIDIA plugin ready
  #   + gpu-activate.sh validation passes
  enabled: false

  # PSS-compatible NVIDIA runtime (requires RuntimeClass 'nvidia' in cluster)
  runtimeClassName: "nvidia"

  image:
    repository: "vllm/vllm-openai"
    tag: "v0.6.6"
    pullPolicy: IfNotPresent

  env:
    MODEL: "abi-commits/qwen-query-optimizer"
    GPU_MEMORY_UTILIZATION: "0.85"
    MAX_MODEL_LEN: "2048"
    VLLM_WORKER_MULTIPROC_METHOD: "spawn"

  persistence:
    storageClassName: "managed-premium"
    size: "30Gi"

  resources:
    requests:
      cpu: "2000m"
      memory: "16Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "6000m"
      memory: "80Gi"
      nvidia.com/gpu: "1"

# ---------------------------------------------------------------------------
# NVIDIA GPU Device Plugin
# ---------------------------------------------------------------------------
nvidia:
  devicePlugin:
    enabled: true
    image:
      repository: "nvcr.io/nvidia/k8s-device-plugin"
      tag: "v0.17.0"
      pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Network Policies
# ---------------------------------------------------------------------------
networkPolicies:
  enabled: true

# ---------------------------------------------------------------------------
# ResourceQuota — sized for production app pool (Standard_D8s_v4 × 2-5 nodes)
# ---------------------------------------------------------------------------
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "60"
    services: "20"
    secrets: "50"
    configmaps: "20"
    persistentvolumeclaims: "10"

# ---------------------------------------------------------------------------
# LimitRange — production defaults
# ---------------------------------------------------------------------------
limitRange:
  enabled: true
  defaultRequest:
    cpu: "100m"
    memory: "256Mi"
  default:
    cpu: "500m"
    memory: "512Mi"
  max:
    cpu: "8000m"
    memory: "16Gi"
