{{- if .Values.inference.enabled }}
##########################################################################
# Inference Service — SecretProviderClass
# Pulls HuggingFace token from Key Vault for downloading gated models.
##########################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: slm-inference-kv-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
spec:
  provider: azure
  secretObjects:
    - secretName: slm-inference-runtime-secrets
      type: Opaque
      data:
        - objectName: huggingface-hub-token
          key: HUGGINGFACE_HUB_TOKEN
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.inference.managedIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.keyVault.name | quote }}
    tenantId: {{ .Values.global.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: huggingface-hub-token
          objectType: secret
{{- end }}
