{{- if .Values.alembic.enabled }}
##########################################################################
# Alembic Migration — ServiceAccount
##########################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-alembic-job
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: alembic
  annotations:
    azure.workload.identity/client-id: {{ .Values.alembic.managedIdentity.clientId | quote }}
automountServiceAccountToken: false
{{- end }}
