{{- if .Values.alembic.enabled }}
##########################################################################
# Alembic Migration — SecretProviderClass
# The job only needs DATABASE_URL to run migrations.
##########################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: slm-alembic-kv-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: alembic
spec:
  provider: azure
  secretObjects:
    - secretName: slm-alembic-runtime-secrets
      type: Opaque
      data:
        - objectName: postgres-connection-string
          key: DATABASE_URL
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.alembic.managedIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.keyVault.name | quote }}
    tenantId: {{ .Values.global.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: postgres-connection-string
          objectType: secret
{{- end }}
