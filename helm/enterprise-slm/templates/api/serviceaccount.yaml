{{- if .Values.api.enabled }}
##########################################################################
# API Service — ServiceAccount
# Annotated for Workload Identity so the pod can authenticate to Azure
# services (Key Vault, ACR) without storing credentials.
##########################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-api-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    # Azure Workload Identity binding — value comes from terraform output
    azure.workload.identity/client-id: {{ .Values.api.managedIdentity.clientId | quote }}
automountServiceAccountToken: false
{{- end }}
