{{- if and .Values.qdrant.enabled .Values.qdrant.backup.enabled }}
##########################################################################
# Qdrant Backup — ServiceAccount
#
# Annotated for Azure Workload Identity so the backup CronJob pod can
# authenticate to Azure Blob Storage without storing credentials.
#
# The Federated Identity Credential created by Terraform binds this SA
# (subject: system:serviceaccount:<ns>:sa-qdrant-backup) to the
# 'mi-<prefix>-qdrant-backup' managed identity, which holds
# 'Storage Blob Data Contributor' on the backup storage account.
##########################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.qdrant.backup.serviceAccountName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant-backup
  annotations:
    # Azure Workload Identity — client ID from Terraform keyvault module output
    # managed_identity_client_ids["qdrant-backup"]
    azure.workload.identity/client-id: {{ .Values.qdrant.backup.managedIdentityClientId | default "" | quote }}
# Do not auto-mount the default ServiceAccount token — the Workload Identity
# webhook injects the OIDC token via a projected volume instead.
automountServiceAccountToken: false
{{- end }}
