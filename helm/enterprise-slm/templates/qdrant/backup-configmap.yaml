{{- if and .Values.qdrant.enabled .Values.qdrant.backup.enabled }}
##########################################################################
# Qdrant Backup — ConfigMap (shell script)
#
# Lifecycle for each run:
#   1. POST /collections/{name}/snapshots   → triggers snapshot
#   2. GET  /collections/{name}/snapshots/{file}  → streams snapshot to stdout
#   3. azcopy copy (via stdin pipe) → uploads to Azure Blob Storage
#   4. List blobs older than retentionDays and delete them
#
# Authentication: Azure Workload Identity (OIDC token auto-injected by the
# azure-workload-identity mutating webhook into the pod).  The storage
# account must grant 'Storage Blob Data Contributor' to the managed identity
# that .Values.qdrant.backup.serviceAccountName is bound to.
##########################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: qdrant-backup-script
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant-backup
data:
  backup.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # ── Configuration (injected via env by CronJob) ────────────────────────
    QDRANT_URL="${QDRANT_URL}"
    COLLECTION="${COLLECTION}"
    STORAGE_ACCOUNT="${STORAGE_ACCOUNT}"
    CONTAINER="${CONTAINER}"
    RETENTION_DAYS="${RETENTION_DAYS}"

    TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
    BLOB_NAME="${COLLECTION}-${TIMESTAMP}.snapshot"

    echo "[backup] Starting Qdrant snapshot for collection '${COLLECTION}'..."

    # ── 1. Create snapshot ──────────────────────────────────────────────────
    SNAPSHOT_RESP=$(curl -sf -X POST \
      "${QDRANT_URL}/collections/${COLLECTION}/snapshots" \
      -H "Content-Type: application/json")

    SNAPSHOT_NAME=$(echo "${SNAPSHOT_RESP}" | \
      python3 -c "import sys,json; print(json.load(sys.stdin)['result']['name'])")

    if [[ -z "${SNAPSHOT_NAME}" ]]; then
      echo "[backup] ERROR: Failed to create snapshot. Response: ${SNAPSHOT_RESP}" >&2
      exit 1
    fi
    echo "[backup] Snapshot created: ${SNAPSHOT_NAME}"

    # ── 2. Wait up to 5 min for snapshot to be ready ───────────────────────
    MAX_WAIT=300
    WAITED=0
    while true; do
      STATUS=$(curl -sf \
        "${QDRANT_URL}/collections/${COLLECTION}/snapshots" | \
        python3 -c "
    import sys, json
    snaps = json.load(sys.stdin).get('result', [])
    match = [s for s in snaps if s['name'] == '${SNAPSHOT_NAME}']
    print(match[0]['status'] if match else 'not_found')
    ")
      if [[ "${STATUS}" == "done" || "${STATUS}" == "ready" ]]; then break; fi
      if [[ "${STATUS}" == "not_found" ]]; then
        echo "[backup] ERROR: Snapshot not found after creation." >&2; exit 1
      fi
      if [[ ${WAITED} -ge ${MAX_WAIT} ]]; then
        echo "[backup] ERROR: Snapshot not ready after ${MAX_WAIT}s." >&2; exit 1
      fi
      echo "[backup] Waiting for snapshot... (status=${STATUS}, waited=${WAITED}s)"
      sleep 10; (( WAITED += 10 ))
    done

    # ── 3. Stream snapshot → azcopy upload ────────────────────────────────
    BLOB_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${CONTAINER}/${BLOB_NAME}"
    echo "[backup] Uploading to ${BLOB_URL}..."

    curl -sf "${QDRANT_URL}/collections/${COLLECTION}/snapshots/${SNAPSHOT_NAME}" | \
      azcopy copy \
        --from-to PipeBlob \
        --blob-type BlockBlob \
        --put-md5 \
        - "${BLOB_URL}"

    echo "[backup] Upload complete."

    # ── 4. Delete the local Qdrant snapshot (frees disk) ──────────────────
    curl -sf -X DELETE \
      "${QDRANT_URL}/collections/${COLLECTION}/snapshots/${SNAPSHOT_NAME}" \
      || echo "[backup] WARN: Could not delete local snapshot (non-fatal)"

    # ── 5. Prune old blobs ─────────────────────────────────────────────────
    echo "[backup] Pruning blobs older than ${RETENTION_DAYS} days..."
    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null \
          || date -u -v "-${RETENTION_DAYS}d" +"%Y-%m-%dT%H:%M:%SZ")  # macOS fallback

    az storage blob list \
      --account-name "${STORAGE_ACCOUNT}" \
      --container-name "${CONTAINER}" \
      --prefix "${COLLECTION}-" \
      --query "[?properties.lastModified < '${CUTOFF}'].name" \
      -o tsv | while read -r old_blob; do
        if [[ -n "${old_blob}" ]]; then
          echo "[backup] Deleting old blob: ${old_blob}"
          az storage blob delete \
            --account-name "${STORAGE_ACCOUNT}" \
            --container-name "${CONTAINER}" \
            --name "${old_blob}"
        fi
      done

    echo "[backup] Done. Snapshot '${BLOB_NAME}' stored in ${CONTAINER}."
{{- end }}
