{{- if .Values.nvidia.devicePlugin.enabled }}
##########################################################################
# NVIDIA — RuntimeClass
#
# Registers the 'nvidia' RuntimeClass so pods can opt in to the NVIDIA
# container runtime (containerd + nvidia-container-toolkit).
#
# AKS GPU node pools ship with containerd configured as the CRI.  The
# NVIDIA device plugin DaemonSet (nvidia/device-plugin.yaml) installs the
# GPU driver and registers the 'nvidia.com/gpu' extended resource.
#
# To use it set:
#   spec.runtimeClassName: nvidia
# on any pod that needs GPU access.  Non-GPU pods must NOT set this field.
#
# Docs:
#   https://kubernetes.io/docs/concepts/containers/runtime-class/
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
##########################################################################
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: nvidia-runtime
# 'nvidia' must match the runtime handler name registered in containerd
# config at /etc/containerd/config.toml on every GPU node.
# Azure AKS GPU pool nodes use 'nvidia' by default when the
# 'nvidia-container-runtime' package is installed.
handler: nvidia
scheduling:
  nodeSelector:
    # Automatically target GPU nodes for pods that use this RuntimeClass
    agentpool: gpupool
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
{{- end }}
