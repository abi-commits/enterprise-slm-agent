{{- if .Values.nvidia.devicePlugin.enabled }}
##########################################################################
# NVIDIA GPU Device Plugin — Dedicated Namespace
#
# The device plugin requires privileged containers (hostDevice access) and
# cannot run under PSS "restricted". It gets its own namespace with
# PSS "privileged" to contain the blast radius.
##########################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-device-plugin
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    # Device plugin needs host-level GPU access → must use privileged PSS
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
{{- end }}
