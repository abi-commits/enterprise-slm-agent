{{- if .Values.knowledge.enabled }}
##########################################################################
# Knowledge Service — ServiceAccount
##########################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-knowledge-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "enterprise-slm.labels" . | nindent 4 }}
    app.kubernetes.io/component: knowledge
  annotations:
    azure.workload.identity/client-id: {{ .Values.knowledge.managedIdentity.clientId | quote }}
automountServiceAccountToken: false
{{- end }}
