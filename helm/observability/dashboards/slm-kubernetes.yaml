##########################################################################
# Grafana Dashboard — SLM Kubernetes Resources
#
# Pod CPU, memory, restarts, HPA status, and PVC usage for slm-prod namespace.
##########################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-slm-kubernetes
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Enterprise SLM"
data:
  slm-kubernetes.json: |
    {
      "title": "SLM — Kubernetes Resources",
      "uid": "slm-kubernetes",
      "tags": ["slm", "kubernetes", "resources"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "value": "Prometheus" }
          },
          {
            "name": "deployment",
            "type": "query",
            "datasource": "${datasource}",
            "query": "label_values(kube_deployment_info{namespace='slm-prod'}, deployment)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "CPU Usage by Pod",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='slm-prod', container!='', container!='POD'}[5m])) by (pod)",
            "legendFormat": "{{ pod }}",
            "datasource": "${datasource}"
          }],
          "fieldConfig": { "defaults": { "unit": "short", "displayName": "cores" } }
        },
        {
          "id": 2, "type": "timeseries", "title": "Memory Working Set by Pod",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace='slm-prod', container!='', container!='POD'}) by (pod)",
            "legendFormat": "{{ pod }}",
            "datasource": "${datasource}"
          }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 3, "type": "timeseries", "title": "Pod Restarts",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 7 },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace='slm-prod'}[1h])",
            "legendFormat": "{{ pod }}/{{ container }}",
            "datasource": "${datasource}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "short",
              "thresholds": { "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 2}, {"color": "red", "value": 5}]
              }
            }
          }
        },
        {
          "id": 4, "type": "timeseries", "title": "HPA — Current vs Desired Replicas",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace='slm-prod'}",
              "legendFormat": "current — {{ horizontalpodautoscaler }}",
              "datasource": "${datasource}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace='slm-prod'}",
              "legendFormat": "max — {{ horizontalpodautoscaler }}",
              "datasource": "${datasource}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_min_replicas{namespace='slm-prod'}",
              "legendFormat": "min — {{ horizontalpodautoscaler }}",
              "datasource": "${datasource}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5, "type": "table", "title": "PVC Capacity & Usage",
          "gridPos": { "x": 0, "y": 15, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_capacity_bytes{namespace='slm-prod'}",
              "legendFormat": "capacity — {{ persistentvolumeclaim }}",
              "instant": true,
              "datasource": "${datasource}"
            },
            {
              "expr": "kubelet_volume_stats_available_bytes{namespace='slm-prod'}",
              "legendFormat": "available — {{ persistentvolumeclaim }}",
              "instant": true,
              "datasource": "${datasource}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 6, "type": "timeseries", "title": "CPU Request Utilization % (vs limit)",
          "gridPos": { "x": 12, "y": 15, "w": 12, "h": 7 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='slm-prod', container!='', container!='POD'}[5m])) by (container) / sum(kube_pod_container_resource_limits{namespace='slm-prod', resource='cpu'}) by (container) * 100",
            "legendFormat": "{{ container }} CPU %",
            "datasource": "${datasource}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "percent",
              "thresholds": { "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]
              }
            }
          }
        }
      ]
    }
